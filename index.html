<!DOCTYPE html> 
<html lang="zh-CN"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鹰眼看盘 - 专业金融分析平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🦅</span>
                <span class="logo-text">鹰眼看盘</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link active">鹰眼看盘</a></li>
                <li><a href="nuclear.html" class="nav-link">鹰眼查核</a></li>
                <li><a href="commodity.html" class="nav-link">大宗商品</a></li>
                <li><a href="daohang.html" class="nav-link">鹰眼导航</a></li>
                <li><a href="method.html" class="nav-link">方法说明</a></li>
            </ul>
            <div class="nav-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="main-content">
        <!-- 主页：鹰眼看盘 -->
        <section id="home" class="page-section active">
            <div class="section-header">
                <h1>🦅 鹰眼看盘</h1> 
                <p class="subtitle">专业金融分析 · 智能评分系统</p>
            </div>
            
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-stocks">30</div>
                    <div class="stat-label">监测股票</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="strong-buy">0</div>
                    <div class="stat-label">强力买入</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="buy">0</div>
                    <div class="stat-label">买入</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="hold">0</div>
                    <div class="stat-label">持有</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="sell">0</div>
                    <div class="stat-label">卖出</div>
                </div>
            </div>

            <!-- 股票筛选 -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label>市场:</label>
                    <select id="market-filter">
                        <option value="all">全部</option>
                        <option value="US">美股</option>
                        <option value="HK">港股</option>
                        <option value="CN">A股</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>评级:</label>
                    <select id="rating-filter">
                        <option value="all">全部</option>
                        <option value="strong_buy">强力买入</option>
                        <option value="buy">买入</option>
                        <option value="hold">持有</option>
                        <option value="sell">卖出</option>
                    </select>
                </div>
                <button class="btn-refresh" onclick="refreshData()">
                    <span>🔄</span> 刷新数据
                </button>
            </div>

            <!-- 股票列表 -->
            <div class="stock-table-container">
                <table class="stock-table">
                    <thead>
                        <tr>
                            <th>股票代码</th>
                            <th>名称</th>
                            <th>市场</th>
                            <th>当前价格</th>
                            <th>涨跌幅</th>
                            <th>目标价</th>
                            <th>上行空间</th>
                            <th>总分</th>
                            <th>评级</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="stock-table-body">
                        <!-- 股票数据将通过JS动态加载 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- 个股详情弹窗 -->
    <div class="modal" id="stock-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-stock-name">股票详情</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body">
                <!-- 图表区域 -->
                <div class="chart-container">
                    <canvas id="stock-chart"></canvas>
                </div>
                
                <!-- 得分拆解 -->
                <div class="score-breakdown">
                    <h3>评分拆解</h3>
                    <div class="score-item">
                        <span class="score-label">财务健康 (30分)</span>
                        <div class="score-bar">
                            <div class="score-fill" id="score-financial" style="width: 0%"></div>
                        </div>
                        <span class="score-value" id="score-financial-value">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">估值水平 (30分)</span>
                        <div class="score-bar">
                            <div class="score-fill" id="score-valuation" style="width: 0%"></div>
                        </div>
                        <span class="score-value" id="score-valuation-value">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">新闻情绪 (25分)</span>
                        <div class="score-bar">
                            <div class="score-fill" id="score-sentiment" style="width: 0%"></div>
                        </div>
                        <span class="score-value" id="score-sentiment-value">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">催化剂 (15分)</span>
                        <div class="score-bar">
                            <div class="score-fill" id="score-catalyst" style="width: 0%"></div>
                        </div>
                        <span class="score-value" id="score-catalyst-value">0</span>
                    </div>
                </div>

                <!-- 财务卡片 -->
                <div class="financial-cards">
                    <div class="fin-card">
                        <div class="fin-label">ROE</div>
                        <div class="fin-value" id="fin-roe">--</div>
                    </div>
                    <div class="fin-card">
                        <div class="fin-label">净利率</div>
                        <div class="fin-value" id="fin-net-margin">--</div>
                    </div>
                    <div class="fin-card">
                        <div class="fin-label">流动比率</div>
                        <div class="fin-value" id="fin-current">--</div>
                    </div>
                    <div class="fin-card">
                        <div class="fin-label">资产负债率</div>
                        <div class="fin-value" id="fin-debt">--</div>
                    </div>
                    <div class="fin-card">
                        <div class="fin-label">PE</div>
                        <div class="fin-value" id="fin-pe">--</div>
                    </div>
                    <div class="fin-card">
                        <div class="fin-label">目标价</div>
                        <div class="fin-value" id="fin-target">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <p>🦅 鹰眼看盘 · 数据仅供参考，不构成投资建议</p>
        <p class="footer-disclaimer">投资有风险，入市需谨慎</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
